<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Anagram Artist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎨 Anagram Artist</h1>

<div id="dashboard">
  <p id="stats"></p>
  <button onclick="start()">Start Training</button>
</div>

<div id="game" class="hidden">
  <div id="card"></div>

  <div class="buttons">
    <button onclick="correct()">✔ Correct</button>
    <button onclick="wrong()">✘ Wrong</button>
    <button onclick="star()">⭐ Sketchbook</button>
    <button onclick="next()">⏭ Skip</button>
  </div>
</div>

<script src="words.js"></script>
<script src="app.js"></script>

</body>
</html>
<div id="wordManager">
  <h3>📂 Word Manager</h3>

  <input type="file" onchange="importFile(event)" />

  <br><br>

  <textarea id="manual"></textarea>
<button onclick="addManualWords()">Add</button>
